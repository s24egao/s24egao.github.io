<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>木白</title>
	<meta name="description" content="Illustrator / Developer">
	<meta property="og:title" content="木白">
	<meta property="og:description" content="Illustrator / Developer">
	<meta property="og:image" content="https://s24egao.github.io/profile.jpg">
	<meta property="twitter:card" content="summary">
	<meta property="twitter:image" content="https://s24egao.github.io/profile.jpg">
	<link rel="icon" type="image" href="icon.png">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/p5.js" type="text/javascript"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" type="text/javascript"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;900&display=swap" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="index.css">
	<script src="contents.js" type="text/javascript"></script>
</head>
<body>
	<div id="info" style="animation: slide-right 0.5s backwards; overflow-y: scroll;">
		<div id="info-tag">INFO</div>
		<div id="info-swipe" style="position: absolute; width: 100%; height: 100%;" ontouchstart="touch_start(event)" onmousedown="touch_start(event)"></div>
		<div id="arrow" style="position: absolute; right: 50%; bottom: 35px; animation: arrow 1s 0s infinite alternate-reverse; transition-duration: 0.3s; transform: rotate(90deg);">
			<div id="arrow-up" style="position: absolute; width: 36px; height: 5px; background: #dddddd; transform: rotate(60deg); transform-origin: 2.5px 2.5px; transition-duration: 0.3s;"></div>
			<div id="arrow-down" style="position: absolute; width: 36px; height: 5px; background: #dddddd; transform: rotate(-60deg); transform-origin: 2.5px 2.5px; transition-duration: 0.3s;"></div>
		</div>
		<div style="display: flex; flex-direction: column; align-items: center; flex: 1 0 55%">
			<div style="flex: 0 10 15%"></div>
			<div id="profile_pic" style="width: 160px; height: 160px; margin: 0px 0px 0px 0px; overflow: hidden; border-radius: 100%; isolation: isolate; flex-shrink: 0;">
				<img src="profile.jpg" style="animation: appear 0.5s 0.3s backwards;">
			</div>
			<div style="font: 300 32px Noto Sans TC; margin: 18px; -webkit-user-select: none; animation: slide-up 0.5s 0.5s backwards;">木白</div>
			<div style="background: black; width: 30px; height: 2px; animation: slide-up 0.5s 0.7s backwards;"></div>
			<div id="info-text" style="animation: slide-up 0.5s 0.9s backwards;  isolation: isolate;">
				<div id="info-text-container">
					<div>A student interested in drawing, motion graphics, anime and game development.</div>
					<div>Congratulations!! you find the second page!</div>
				</div>
			</div>
		</div>
		<div style="display: flex; flex-direction: column; align-items: center; justify-content: flex-end;">
			<a class="link" href="https://twitter.com/s24egao" target="_blank" style="animation: slide-right 0.5s 0.3s backwards;"><div>twitter</div></a>
			<a class="link" href="https://www.pixiv.net/users/80929565" target="_blank" style="animation: slide-right 0.5s 0.4s backwards;"><div>pixiv</div></a>
			<a class="link" href="https://www.youtube.com/channel/UCudLKarfLoiMVZW0zyApMVA" target="_blank" style="animation: slide-right 0.5s 0.5s backwards;"><div>youtube</div></a>
			<div style="height: 100px;"></div>
		</div>
		<div style="position: fixed; left: 6px; bottom: 3px; color: #999999; font: Noto Sans TC;">© 2022</div>
	</div>
	<div id="gallery" style="flex: 1; position: relative; overflow: hidden; height: 100%;">
		<div id="gallery-tag">GALLERY</div>
		<div id="contents"></div>
	</div>
	<div id="mouse_effect" style="position: fixed; width: 100%; height: 100%; pointer-events: none; mix-blend-mode: difference; z-index: 2;"></div>
	<script src="index.js" type="text/javascript"></script>
	<script src="canvas/mouse_effect.js" type="text/javascript"></script>
</body>
</html>
